name: Build and Release

permissions:
  contents: write # 允许创建 Release

on:
  push:
    tags:
      - "v*"           # 推送 v1.0.0 等标签时自动构建 + 发布
  workflow_dispatch:    # 手动触发时仅构建 DMG（不发布 Release）

jobs:
  build:
    runs-on: macos-14 # Apple Silicon runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          fi

      - name: Build DMG
        run: |
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh "${{ steps.version.outputs.VERSION }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OTPilot-${{ steps.version.outputs.VERSION }}
          path: build/*.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: OTPilot v${{ steps.version.outputs.VERSION }}
          files: build/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
